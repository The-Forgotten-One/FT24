<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Электронный журнал успеваемости студентов" />
  <title>Электронный журнал — Веб-разработка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <header class="hero">
    <div class="container hero__inner">
      <div class="hero__content glass">
        <span class="eyebrow">Электронный журнал</span>
        <h1 id="courseTitle">Журнал успеваемости по веб-разработке</h1>
        <p id="courseSubtitle" class="hero__subtitle">
          Удобный журнал с группами, оценками по 8 лабораторным и итоговыми статусами.
        </p>

        <div class="hero__meta" id="heroMeta"></div>
      </div>
    </div>
  </header>

  <main class="container main-layout">
    <section class="stats-grid" id="statsGrid" aria-label="Сводка"></section>

    <section class="panel glass controls">
      <div class="controls__top">
        <div class="tabs" id="groupTabs" aria-label="Группы"></div>

        <div class="controls__actions">
          <label class="field field--search">
            <span class="visually-hidden">Поиск</span>
            <input type="search" id="searchInput" placeholder="Поиск по студенту" autocomplete="off" />
          </label>

          <label class="field field--select">
            <span class="visually-hidden">Сортировка</span>
            <select id="sortSelect">
              <option value="rating">Сначала сильные</option>
              <option value="name">По алфавиту</option>
              <option value="progress">По количеству сданных</option>
            </select>
          </label>
        </div>
      </div>

      <div class="group-summary" id="groupSummary"></div>
    </section>

    <section class="panel glass journal-section">
      <div class="journal-section__header">
        <div>
          <span class="eyebrow eyebrow--dark">Журнал группы</span>
          <h2 id="journalTitle">Текущая группа</h2>
        </div>

        <div class="legend">
          <span class="legend__item"><i class="dot dot--good"></i> автозачёт</span>
          <span class="legend__item"><i class="dot dot--mid"></i> допуск</span>
          <span class="legend__item"><i class="dot dot--bad"></i> риск</span>
        </div>
      </div>

      <div class="table-wrap">
        <table class="journal-table" id="journalTable">
          <thead>
            <tr id="tableHeadRow">
              <th>№</th>
              <th>Студент</th>
            </tr>
          </thead>
          <tbody id="journalBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state hidden">
        <h3>Ничего не найдено</h3>
        <p>Попробуй изменить запрос поиска или переключить группу.</p>
      </div>
    </section>
  </main>

  <script src="data/course.js"></script>
  <script src="data/students.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
